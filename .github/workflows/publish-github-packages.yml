# Publishes the unified SDK to GitHub Packages so packages appear under the repo / org "Packages" tab.
# (npmjs.org publishes do not show up there — only npm.pkg.github.com does.)
name: Publish to GitHub Packages

on:
  # Run from Actions tab → this workflow → "Run workflow" after bumping talak-web3-publish version if a publish fails with "version already exists".
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'talak-web3-publish/**'
      - 'packages/talak-web3/**'
      - '.github/workflows/publish-github-packages.yml'

concurrency:
  group: github-packages-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.12.0'
  PNPM_VERSION: '9.0.0'

jobs:
  publish:
    name: Publish @dagimabebe/talak-web3
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dagimabebe'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build talak-web3 (packages/talak-web3)
        run: pnpm --filter talak-web3 build

      - name: Sync dist and README into talak-web3-publish
        run: |
          rm -rf talak-web3-publish/dist
          cp -r packages/talak-web3/dist talak-web3-publish/dist
          cp -f packages/talak-web3/README.md talak-web3-publish/README.md
          cp -f LICENSE talak-web3-publish/LICENSE

      - name: Prepare package metadata for GitHub Packages
        working-directory: talak-web3-publish
        run: |
          npm pkg set name="@dagimabebe/talak-web3"
          npm pkg set publishConfig.registry="https://npm.pkg.github.com"
          npm pkg set publishConfig.access="public"

      - name: Publish to GitHub Packages
        working-directory: talak-web3-publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20.12.0'
  PNPM_VERSION: '9.0.0'

jobs:

  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [release]
    if: ${{ needs.release.outputs.releases_created == 'true' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Sync dist into talak-web3-publish
        run: |
          rm -rf talak-web3-publish/dist
          cp -r packages/talak-web3/dist talak-web3-publish/dist
          cp -f packages/talak-web3/README.md talak-web3-publish/README.md
          cp -f LICENSE talak-web3-publish/LICENSE

      - name: Verify dist contains bundled artifacts
        run: |

          INDEX_SIZE=$(stat -f%z packages/talak-web3/dist/index.js 2>/dev/null || stat -c%s packages/talak-web3/dist/index.js 2>/dev/null)
          if [ "$INDEX_SIZE" -lt 10000 ]; then
            echo "ERROR: index.js is only $INDEX_SIZE bytes - expected bundled output (>10KB)"
            exit 1
          fi
          echo "✓ Bundled artifacts verified (index.js: $INDEX_SIZE bytes)"

          if grep -q "export type.*= any;" packages/talak-web3/dist/index.d.ts; then
            echo "ERROR: Type declarations contain 'any' types"
            exit 1
          fi
          echo "✓ Type declarations verified (no 'any' types)"

      - name: Prepare package for npm
        working-directory: talak-web3-publish
        run: |
          npm pkg set name="talak-web3"
          npm pkg set publishConfig.registry="https://registry.npmjs.org"
          npm pkg set publishConfig.access="public"

      - name: Publish to npm
        working-directory: talak-web3-publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

  publish-gh:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [release]
    if: ${{ needs.release.outputs.releases_created == 'true' }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dagimabebe'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Sync dist into talak-web3-publish
        run: |
          rm -rf talak-web3-publish/dist
          cp -r packages/talak-web3/dist talak-web3-publish/dist
          cp -f packages/talak-web3/README.md talak-web3-publish/README.md
          cp -f LICENSE talak-web3-publish/LICENSE

      - name: Prepare package for GitHub Packages
        working-directory: talak-web3-publish
        run: |
          npm pkg set name="@dagimabebe/talak-web3"
          npm pkg set publishConfig.registry="https://npm.pkg.github.com"
          npm pkg set publishConfig.access="public"

      - name: Publish to GitHub Packages
        working-directory: talak-web3-publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-notes:
    name: Create Release Notes
    runs-on: ubuntu-latest
    needs: [release]
    if: ${{ needs.release.outputs.releases_created == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Release Notes
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.release.outputs.tag_name }}
          generate_release_notes: true
          append_body: |

            ```bash
            npm install talak-web3

            yarn add talak-web3

            pnpm add talak-web3
            ```

            This release is signed with npm provenance. Verify with:
            ```bash
            npm audit signatures
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
